server {
    listen 443 ssl http2;
    server_name bot.example.org;

    # TLS certificate directives are intentionally deployment-specific.

    location /rus_mus_srb_bot/ {
        # Contact/media capability tokens live in query parameters.
        access_log off;
        # nginx error entries for upstream failures include the full request
        # line as well. Keep those signed URLs out of error.log; /healthz below
        # remains logged and is the operational availability signal.
        error_log /dev/null crit;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
    }
}
